<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Dashboard — AI Onboarding Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Firebase SDKs (same version as index.html) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- LOGIN VIEW -->
  <div id="login-view" class="hidden min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md fade-in">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4">
          <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Manager Dashboard</h1>
        <p class="text-gray-500 mt-1">Sign in with your manager account</p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="email-input">Email address</label>
            <input
              id="email-input"
              type="email"
              required
              placeholder="manager@company.com"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="password-input">Password</label>
            <input
              id="password-input"
              type="password"
              required
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            />
          </div>

          <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
            <i class="fa-solid fa-circle-exclamation mr-1"></i>
            <span id="login-error-msg">Invalid email or password.</span>
          </div>

          <button
            type="submit"
            id="login-btn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors"
          >
            <span id="login-btn-text">Sign In</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view" class="hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
            <i class="fa-solid fa-shield-halved text-white text-sm"></i>
          </div>
          <span class="font-bold text-gray-900 text-lg">Manager Dashboard</span>
        </div>
        <div class="flex items-center gap-4">
          <span id="manager-email-display" class="text-sm text-gray-500 hidden sm:block"></span>
          <button
            id="signout-btn"
            class="flex items-center gap-2 text-sm text-gray-600 hover:text-red-600 transition-colors font-medium"
          >
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            Sign Out
          </button>
        </div>
      </div>
    </header>

    <!-- Summary Bar -->
    <div class="bg-indigo-600 text-white">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-3 gap-4 sm:gap-8">
          <div class="text-center">
            <div id="summary-total" class="text-3xl font-bold">—</div>
            <div class="text-indigo-200 text-sm mt-1">Total Employees</div>
          </div>
          <div class="text-center">
            <div id="summary-completed" class="text-3xl font-bold">—</div>
            <div class="text-indigo-200 text-sm mt-1">Skills Completed</div>
          </div>
          <div class="text-center">
            <div id="summary-inprogress" class="text-3xl font-bold">—</div>
            <div class="text-indigo-200 text-sm mt-1">In Progress</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

      <!-- Loading state -->
      <div id="dashboard-loading" class="text-center py-20">
        <i class="fa-solid fa-circle-notch fa-spin text-indigo-500 text-3xl mb-4"></i>
        <p class="text-gray-500">Loading employee data...</p>
      </div>

      <!-- Empty state -->
      <div id="dashboard-empty" class="hidden text-center py-20">
        <i class="fa-solid fa-users text-gray-300 text-5xl mb-4"></i>
        <p class="text-gray-500 text-lg font-medium">No employees yet</p>
        <p class="text-gray-400 text-sm mt-1">Employees will appear here once they reach the pathway stage.</p>
      </div>

      <!-- Error state -->
      <div id="dashboard-error" class="hidden text-center py-20">
        <i class="fa-solid fa-triangle-exclamation text-red-400 text-4xl mb-4"></i>
        <p class="text-gray-700 font-medium">Failed to load data</p>
        <p id="dashboard-error-msg" class="text-gray-500 text-sm mt-1"></p>
        <button onclick="loadDashboard()" class="mt-4 text-indigo-600 hover:underline text-sm">Try again</button>
      </div>

      <!-- Employee cards grid -->
      <div id="employee-grid" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

    </main>
  </div>

  <script>
    // -----------------------------------------------------------------------
    // Firebase init — same project as employee app
    // -----------------------------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyBDnt-TNjyl0jJmf-JIwn-SUa0iRpifOV8",
      authDomain: "ai-skill-gap-finder.firebaseapp.com",
      projectId: "ai-skill-gap-finder",
      storageBucket: "ai-skill-gap-finder.firebasestorage.app",
      messagingSenderId: "119716780632",
      appId: "1:119716780632:web:3a1e9b213d7f60b934882d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    const TOKEN_KEY = 'manager_token';
    const EMAIL_KEY = 'manager_email';

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function getEmail() { return localStorage.getItem(EMAIL_KEY) || ''; }

    function saveSession(token, email) {
      localStorage.setItem(TOKEN_KEY, token);
      localStorage.setItem(EMAIL_KEY, email);
    }

    function clearSession() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(EMAIL_KEY);
    }

    // -----------------------------------------------------------------------
    // View helpers
    // -----------------------------------------------------------------------
    function showLogin() {
      document.getElementById('login-view').classList.remove('hidden');
      document.getElementById('dashboard-view').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('dashboard-view').classList.remove('hidden');
      document.getElementById('manager-email-display').textContent = getEmail();
    }

    function setLoginError(msg) {
      const el = document.getElementById('login-error');
      document.getElementById('login-error-msg').textContent = msg;
      el.classList.remove('hidden');
    }

    function clearLoginError() {
      document.getElementById('login-error').classList.add('hidden');
    }

    // -----------------------------------------------------------------------
    // Auth — Firebase sign-in, then whitelist check
    // -----------------------------------------------------------------------
    async function doLogin(email, password) {
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      btn.disabled = true;
      btnText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Signing in...';
      clearLoginError();

      try {
        // Step 1: authenticate with Firebase
        await auth.signInWithEmailAndPassword(email, password);

        // Step 2: check against manager whitelist
        const res = await fetch('/api/manager/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) {
          // Not a whitelisted manager — sign out of Firebase too
          await auth.signOut();
          setLoginError(data.detail || 'This account is not authorized as a manager.');
          return;
        }

        saveSession(data.token, data.email);
        showDashboard();
        loadDashboard();
      } catch (err) {
        // Firebase auth errors
        const msg = err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found'
          ? 'Invalid email or password.'
          : (err.message || 'Sign-in failed. Please try again.');
        setLoginError(msg);
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
      }
    }

    async function doSignOut() {
      const token = getToken();
      try {
        await fetch('/api/manager/logout', {
          method: 'POST',
          headers: { 'X-Manager-Token': token }
        });
      } catch (_) {}
      try { await auth.signOut(); } catch (_) {}
      clearSession();
      showLogin();
    }

    // -----------------------------------------------------------------------
    // Dashboard data
    // -----------------------------------------------------------------------
    async function loadDashboard() {
      document.getElementById('dashboard-loading').classList.remove('hidden');
      document.getElementById('dashboard-empty').classList.add('hidden');
      document.getElementById('dashboard-error').classList.add('hidden');
      document.getElementById('employee-grid').classList.add('hidden');

      try {
        const res = await fetch('/api/manager/dashboard', {
          headers: { 'X-Manager-Token': getToken() }
        });

        if (res.status === 401) {
          clearSession();
          showLogin();
          return;
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to load dashboard');

        renderDashboard(data.employees || []);
      } catch (err) {
        document.getElementById('dashboard-loading').classList.add('hidden');
        document.getElementById('dashboard-error').classList.remove('hidden');
        document.getElementById('dashboard-error-msg').textContent = err.message;
      }
    }

    function renderDashboard(employees) {
      document.getElementById('dashboard-loading').classList.add('hidden');

      const totalCompleted = employees.reduce((s, e) => s + (e.completed_skills || 0), 0);
      const totalInProgress = employees.reduce((s, e) => s + (e.in_progress_skills || 0), 0);
      document.getElementById('summary-total').textContent = employees.length;
      document.getElementById('summary-completed').textContent = totalCompleted;
      document.getElementById('summary-inprogress').textContent = totalInProgress;

      if (employees.length === 0) {
        document.getElementById('dashboard-empty').classList.remove('hidden');
        return;
      }

      const grid = document.getElementById('employee-grid');
      grid.innerHTML = '';
      employees.forEach(emp => grid.appendChild(buildEmployeeCard(emp)));
      grid.classList.remove('hidden');
    }

    // -----------------------------------------------------------------------
    // Card builder
    // -----------------------------------------------------------------------
    function scoreBadge(score) {
      if (score === null || score === undefined) {
        return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-500">N/A</span>`;
      }
      let cls;
      if (score >= 70) cls = 'bg-green-100 text-green-700';
      else if (score >= 50) cls = 'bg-orange-100 text-orange-700';
      else cls = 'bg-red-100 text-red-700';
      return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ${cls}">${score}%</span>`;
    }

    function severityBadge(severity) {
      const map = {
        critical: 'bg-red-100 text-red-700',
        high:     'bg-orange-100 text-orange-700',
        medium:   'bg-yellow-100 text-yellow-700',
        low:      'bg-green-100 text-green-700',
      };
      const cls = map[(severity || '').toLowerCase()] || 'bg-gray-100 text-gray-500';
      return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold ${cls}">${severity || 'unknown'}</span>`;
    }

    function buildEmployeeCard(emp) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden fade-in';

      const initial = (emp.display_name || '?')[0].toUpperCase();
      const createdDate = emp.created_at ? new Date(emp.created_at).toLocaleDateString() : '';

      const gaps = emp.skill_gaps || [];
      let gapsHtml = '';
      if (gaps.length > 0) {
        const items = gaps.map(gap => {
          const name = gap.skill || gap.skill_name || 'Unknown skill';
          const current = gap.current_level || gap.current || '—';
          const required = gap.required_level || gap.required || '—';
          return `
            <div class="flex items-center justify-between py-1.5 border-b border-gray-50 last:border-0">
              <div class="flex-1 min-w-0 mr-2">
                <p class="text-xs font-medium text-gray-800 truncate">${escHtml(name)}</p>
                <p class="text-xs text-gray-400">${escHtml(current)} → ${escHtml(required)}</p>
              </div>
              ${severityBadge(gap.severity || '')}
            </div>`;
        }).join('');
        gapsHtml = `
          <div class="px-5 pb-4">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Skill Gaps</p>
            <div>${items}</div>
          </div>`;
      } else {
        gapsHtml = `
          <div class="px-5 pb-4">
            <p class="text-xs text-gray-400 italic">No skill gaps recorded.</p>
          </div>`;
      }

      card.innerHTML = `
        <div class="px-5 py-4 border-b border-gray-100 flex items-start gap-3">
          <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm flex-shrink-0">
            ${escHtml(initial)}
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-900 truncate">${escHtml(emp.display_name || 'Unknown')}</p>
            ${emp.user_email ? `<p class="text-xs text-gray-400 truncate">${escHtml(emp.user_email)}</p>` : ''}
            ${createdDate ? `<p class="text-xs text-gray-400">Started ${createdDate}</p>` : ''}
          </div>
          <div class="flex-shrink-0">${scoreBadge(emp.assessment_score)}</div>
        </div>
        <div class="px-5 py-3 border-b border-gray-100 grid grid-cols-3 gap-2 text-center">
          <div>
            <p class="text-lg font-bold text-gray-800">${emp.total_skills || 0}</p>
            <p class="text-xs text-gray-400">Total Skills</p>
          </div>
          <div>
            <p class="text-lg font-bold text-green-600">${emp.completed_skills || 0}</p>
            <p class="text-xs text-gray-400">Completed</p>
          </div>
          <div>
            <p class="text-lg font-bold text-blue-600">${emp.in_progress_skills || 0}</p>
            <p class="text-xs text-gray-400">In Progress</p>
          </div>
        </div>
        <div class="pt-3">${gapsHtml}</div>
      `;

      return card;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // -----------------------------------------------------------------------
    // Event listeners
    // -----------------------------------------------------------------------
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      await doLogin(email, password);
    });

    document.getElementById('signout-btn').addEventListener('click', doSignOut);

    // -----------------------------------------------------------------------
    // Init: check for existing token
    // -----------------------------------------------------------------------
    (async function init() {
      const token = getToken();
      if (token) {
        showDashboard();
        await loadDashboard();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
