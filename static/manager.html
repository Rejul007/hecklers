<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Dashboard — AI Onboarding Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .detail-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease;
    }
    .detail-panel.open {
      grid-template-rows: 1fr;
    }
    .detail-inner { overflow: hidden; }

    .emp-row { transition: box-shadow 0.15s ease; }
    .emp-row:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.12); }
    .emp-row.expanded { box-shadow: 0 4px 20px rgba(99,102,241,0.18); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ── LOGIN ─────────────────────────────────────────────────────────── -->
  <div id="login-view" class="hidden min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md fade-in">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4">
          <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Manager Dashboard</h1>
        <p class="text-gray-500 mt-1">Sign in with your manager account</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
            <input id="email-input" type="email" required placeholder="manager@company.com"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="password-input" type="password" required placeholder="••••••••"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
          <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
            <i class="fa-solid fa-circle-exclamation mr-1"></i>
            <span id="login-error-msg">Invalid email or password.</span>
          </div>
          <button type="submit" id="login-btn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
            <span id="login-btn-text">Sign In</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── DASHBOARD ─────────────────────────────────────────────────────── -->
  <div id="dashboard-view" class="hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
            <i class="fa-solid fa-shield-halved text-white text-sm"></i>
          </div>
          <span class="font-bold text-gray-900 text-lg">Manager Dashboard</span>
        </div>
        <div class="flex items-center gap-4">
          <span id="manager-email-display" class="text-sm text-gray-400 hidden sm:block"></span>
          <button id="signout-btn"
            class="flex items-center gap-2 text-sm text-gray-500 hover:text-red-600 transition-colors font-medium">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
          </button>
        </div>
      </div>
    </header>

    <!-- Floating employee count badge -->
    <div class="fixed top-20 left-4 z-10">
      <div id="emp-count-badge"
        class="hidden backdrop-blur-md bg-indigo-600/80 text-white rounded-2xl px-4 py-2.5 shadow-lg flex items-center gap-2.5">
        <i class="fa-solid fa-users text-indigo-200 text-sm"></i>
        <div>
          <span id="emp-count-number" class="text-lg font-bold leading-none"></span>
          <span class="text-indigo-200 text-xs ml-1">Employees</span>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">

      <!-- Loading -->
      <div id="dashboard-loading" class="text-center py-24">
        <i class="fa-solid fa-circle-notch fa-spin text-indigo-400 text-3xl mb-4"></i>
        <p class="text-gray-400">Loading employee data...</p>
      </div>

      <!-- Empty -->
      <div id="dashboard-empty" class="hidden text-center py-24">
        <i class="fa-solid fa-users text-gray-200 text-5xl mb-4"></i>
        <p class="text-gray-500 font-medium">No employees yet</p>
        <p class="text-gray-400 text-sm mt-1">Employees appear here once they reach the pathway stage.</p>
      </div>

      <!-- Error -->
      <div id="dashboard-error" class="hidden text-center py-24">
        <i class="fa-solid fa-triangle-exclamation text-red-300 text-4xl mb-4"></i>
        <p class="text-gray-600 font-medium">Failed to load data</p>
        <p id="dashboard-error-msg" class="text-gray-400 text-sm mt-1"></p>
        <button onclick="loadDashboard()" class="mt-4 text-indigo-600 hover:underline text-sm">Try again</button>
      </div>

      <!-- Employee list -->
      <div id="employee-list" class="hidden space-y-3"></div>

    </main>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBDnt-TNjyl0jJmf-JIwn-SUa0iRpifOV8",
      authDomain: "ai-skill-gap-finder.firebaseapp.com",
      projectId: "ai-skill-gap-finder",
      storageBucket: "ai-skill-gap-finder.firebasestorage.app",
      messagingSenderId: "119716780632",
      appId: "1:119716780632:web:3a1e9b213d7f60b934882d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const TOKEN_KEY = 'manager_token';
    const EMAIL_KEY = 'manager_email';
    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function getEmail() { return localStorage.getItem(EMAIL_KEY) || ''; }
    function saveSession(t, e) { localStorage.setItem(TOKEN_KEY, t); localStorage.setItem(EMAIL_KEY, e); }
    function clearSession() { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(EMAIL_KEY); }

    // ── Views ───────────────────────────────────────────────────────────────
    function showLogin() {
      document.getElementById('login-view').classList.remove('hidden');
      document.getElementById('dashboard-view').classList.add('hidden');
    }
    function showDashboard() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('dashboard-view').classList.remove('hidden');
      document.getElementById('manager-email-display').textContent = getEmail();
    }

    // ── Auth ────────────────────────────────────────────────────────────────
    async function doLogin(email, password) {
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      btn.disabled = true;
      btnText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Signing in...';
      document.getElementById('login-error').classList.add('hidden');

      try {
        await auth.signInWithEmailAndPassword(email, password);
        const res = await fetch('/api/manager/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) {
          await auth.signOut();
          document.getElementById('login-error-msg').textContent = data.detail || 'Not authorized as a manager.';
          document.getElementById('login-error').classList.remove('hidden');
          return;
        }
        saveSession(data.token, data.email);
        showDashboard();
        loadDashboard();
      } catch (err) {
        const msg = ['auth/invalid-credential', 'auth/wrong-password', 'auth/user-not-found'].includes(err.code)
          ? 'Invalid email or password.'
          : (err.message || 'Sign-in failed.');
        document.getElementById('login-error-msg').textContent = msg;
        document.getElementById('login-error').classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
      }
    }

    async function doSignOut() {
      try { await fetch('/api/manager/logout', { method: 'POST', headers: { 'X-Manager-Token': getToken() } }); } catch (_) {}
      try { await auth.signOut(); } catch (_) {}
      clearSession();
      showLogin();
    }

    // ── Data ────────────────────────────────────────────────────────────────
    async function loadDashboard() {
      document.getElementById('dashboard-loading').classList.remove('hidden');
      document.getElementById('dashboard-empty').classList.add('hidden');
      document.getElementById('dashboard-error').classList.add('hidden');
      document.getElementById('employee-list').classList.add('hidden');
      document.getElementById('emp-count-badge').classList.add('hidden');

      try {
        const res = await fetch('/api/manager/dashboard', { headers: { 'X-Manager-Token': getToken() } });
        if (res.status === 401) { clearSession(); showLogin(); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to load');
        renderDashboard(data.employees || []);
      } catch (err) {
        document.getElementById('dashboard-loading').classList.add('hidden');
        document.getElementById('dashboard-error').classList.remove('hidden');
        document.getElementById('dashboard-error-msg').textContent = err.message;
      }
    }

    function renderDashboard(employees) {
      document.getElementById('dashboard-loading').classList.add('hidden');

      // Floating count badge
      document.getElementById('emp-count-number').textContent = employees.length;
      document.getElementById('emp-count-badge').classList.remove('hidden');

      if (employees.length === 0) {
        document.getElementById('dashboard-empty').classList.remove('hidden');
        return;
      }

      const list = document.getElementById('employee-list');
      list.innerHTML = '';
      employees.forEach((emp, idx) => list.appendChild(buildEmployeeRow(emp, idx)));
      list.classList.remove('hidden');
    }

    // ── Row builder ─────────────────────────────────────────────────────────
    function scoreBadge(score) {
      if (score == null) return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-400">N/A</span>`;
      const cls = score >= 70 ? 'bg-green-100 text-green-700' : score >= 50 ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700';
      return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold ${cls}">${score}%</span>`;
    }

    function severityBadge(severity) {
      const map = { critical:'bg-red-100 text-red-700', high:'bg-orange-100 text-orange-700', medium:'bg-yellow-100 text-yellow-700', low:'bg-green-100 text-green-700' };
      const cls = map[(severity||'').toLowerCase()] || 'bg-gray-100 text-gray-400';
      return `<span class="px-2 py-0.5 rounded text-xs font-semibold ${cls}">${severity||'unknown'}</span>`;
    }

    function buildEmployeeRow(emp, idx) {
      const wrap = document.createElement('div');
      wrap.className = 'emp-row bg-white rounded-2xl border border-gray-200 overflow-hidden fade-in';

      const initial = (emp.display_name || '?')[0].toUpperCase();
      const gaps = emp.skill_gaps || [];

      // ── Summary row (always visible) ──────────────────────────────────
      const summary = document.createElement('div');
      summary.className = 'flex items-center gap-4 px-5 py-4 cursor-pointer select-none';
      summary.innerHTML = `
        <!-- Avatar -->
        <div class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm flex-shrink-0">
          ${escHtml(initial)}
        </div>

        <!-- Name + email -->
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-gray-900 truncate text-sm">${escHtml(emp.display_name || 'Unknown')}</p>
          ${emp.user_email ? `<p class="text-xs text-gray-400 truncate">${escHtml(emp.user_email)}</p>` : ''}
        </div>

        <!-- Stats pills -->
        <div class="hidden sm:flex items-center gap-3 flex-shrink-0 text-center">
          <div>
            <p class="text-sm font-bold text-gray-700">${emp.total_skills || 0}</p>
            <p class="text-xs text-gray-400">Skills</p>
          </div>
          <div class="w-px h-6 bg-gray-100"></div>
          <div>
            <p class="text-sm font-bold text-green-600">${emp.completed_skills || 0}</p>
            <p class="text-xs text-gray-400">Done</p>
          </div>
          <div class="w-px h-6 bg-gray-100"></div>
          <div>
            <p class="text-sm font-bold text-blue-500">${emp.in_progress_skills || 0}</p>
            <p class="text-xs text-gray-400">Active</p>
          </div>
        </div>

        <!-- Score + chevron -->
        <div class="flex items-center gap-3 flex-shrink-0">
          ${scoreBadge(emp.assessment_score)}
          <i class="fa-solid fa-chevron-down text-gray-300 text-xs transition-transform duration-300" id="chevron-${idx}"></i>
        </div>
      `;

      // ── Detail panel (expandable) ──────────────────────────────────────
      const panel = document.createElement('div');
      panel.className = 'detail-panel';
      panel.id = `detail-${idx}`;

      const inner = document.createElement('div');
      inner.className = 'detail-inner';

      inner.innerHTML = buildDetailHtml(emp, gaps);
      panel.appendChild(inner);

      // ── Toggle logic ───────────────────────────────────────────────────
      let open = false;
      summary.addEventListener('click', () => {
        open = !open;
        panel.classList.toggle('open', open);
        wrap.classList.toggle('expanded', open);
        wrap.classList.toggle('border-indigo-200', open);
        document.getElementById(`chevron-${idx}`).style.transform = open ? 'rotate(180deg)' : '';
      });

      wrap.appendChild(summary);
      wrap.appendChild(panel);
      return wrap;
    }

    function buildDetailHtml(emp, gaps) {
      const createdDate = emp.created_at ? new Date(emp.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '';

      let gapsSection = '';
      if (gaps.length === 0) {
        gapsSection = `<p class="text-sm text-gray-400 italic">No skill gaps recorded.</p>`;
      } else {
        gapsSection = gaps.map(gap => {
          const name = gap.skill || gap.skill_name || 'Unknown skill';
          const current = gap.current_level || gap.current || '—';
          const required = gap.required_level || gap.required || '—';
          const reasoning = gap.gap_reasoning || gap.reasoning || gap.description || '';

          // Topics / what the skill comprises — from pathway skill_details keyed by skill name
          const skillDetail = (emp.skill_details || {})[name] || {};
          const topics = skillDetail.topics || [];
          let topicsHtml = '';
          if (topics.length > 0) {
            topicsHtml = `
              <div class="mt-3">
                <p class="text-xs font-semibold text-gray-500 mb-1.5">What this skill covers</p>
                <div class="flex flex-wrap gap-1.5">
                  ${topics.map(t => `<span class="bg-indigo-50 text-indigo-700 text-xs px-2.5 py-1 rounded-full">${escHtml(String(t))}</span>`).join('')}
                </div>
              </div>`;
          }


          return `
            <div class="bg-gray-50 rounded-xl p-4">
              <div class="flex items-start justify-between gap-3 mb-2">
                <p class="font-semibold text-gray-800 text-sm">${escHtml(name)}</p>
                ${severityBadge(gap.severity || '')}
              </div>
              <p class="text-xs text-gray-400 mb-1">
                <span class="font-medium text-gray-500">Current:</span> ${escHtml(current)}
                <span class="mx-1.5 text-gray-300">→</span>
                <span class="font-medium text-gray-500">Required:</span> ${escHtml(required)}
              </p>
              ${reasoning ? `<p class="text-xs text-gray-500 mt-2 leading-relaxed">${escHtml(reasoning)}</p>` : ''}
              ${topicsHtml}
</div>`;
        }).join('');
      }

      return `
        <div class="border-t border-gray-100 px-5 pt-4 pb-5">
          <!-- Mobile stats row -->
          <div class="sm:hidden flex items-center gap-4 mb-4 pb-4 border-b border-gray-100">
            <div class="text-center">
              <p class="text-base font-bold text-gray-700">${emp.total_skills || 0}</p>
              <p class="text-xs text-gray-400">Skills</p>
            </div>
            <div class="text-center">
              <p class="text-base font-bold text-green-600">${emp.completed_skills || 0}</p>
              <p class="text-xs text-gray-400">Completed</p>
            </div>
            <div class="text-center">
              <p class="text-base font-bold text-blue-500">${emp.in_progress_skills || 0}</p>
              <p class="text-xs text-gray-400">In Progress</p>
            </div>
          </div>

          <!-- Meta -->
          <div class="flex items-center gap-3 mb-4 text-xs text-gray-400">
            ${createdDate ? `<span><i class="fa-solid fa-calendar-days mr-1"></i>Started ${escHtml(createdDate)}</span>` : ''}
            ${emp.status ? `<span class="capitalize"><i class="fa-solid fa-circle-dot mr-1"></i>${escHtml(emp.status)}</span>` : ''}
          </div>

          <!-- Skill gaps -->
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Skill Gaps</p>
          <div class="space-y-3">
            ${gapsSection}
          </div>

          <!-- Remove employee -->
          <div class="mt-5 pt-4 border-t border-gray-100 flex justify-end">
            <button
              onclick="removeEmployee('${escHtml(emp.session_id)}', '${escHtml(emp.display_name)}')"
              class="flex items-center gap-1.5 text-xs text-red-500 hover:text-red-700 border border-red-200 hover:border-red-400 rounded-lg px-3 py-1.5 transition-colors">
              <i class="fa-solid fa-trash-can"></i> Remove Employee
            </button>
          </div>
        </div>`;
    }

    async function removeEmployee(sessionId, displayName) {
      if (!confirm(`Remove ${displayName} from the dashboard?\n\nThis permanently deletes their onboarding data.`)) return;
      try {
        const res = await fetch(`/api/manager/employees/${encodeURIComponent(sessionId)}`, {
          method: 'DELETE',
          headers: { 'X-Manager-Token': getToken() }
        });
        if (res.status === 401) { clearSession(); showLogin(); return; }
        if (!res.ok) {
          const data = await res.json().catch(() => null);
          alert((data && data.detail) || `Failed to remove employee (${res.status})`);
          return;
        }
        loadDashboard();
      } catch (err) {
        alert('Network error: ' + err.message);
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Event listeners ─────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await doLogin(
        document.getElementById('email-input').value.trim(),
        document.getElementById('password-input').value
      );
    });

    document.getElementById('signout-btn').addEventListener('click', doSignOut);

    // ── Init ────────────────────────────────────────────────────────────────
    (async function init() {
      if (getToken()) {
        showDashboard();
        await loadDashboard();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
