services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/onboarding.db
    volumes:
      - ollama_data:/root/.ollama      # persists downloaded models
      - db_data:/app/data              # persists SQLite database
    restart: unless-stopped

volumes:
  ollama_data:
  db_data:
